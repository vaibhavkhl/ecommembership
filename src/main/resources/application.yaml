spring:
  application:
    name: demo
# Database Configuration - PG* vars are injected by Railway's Postgres plugin in production;
# defaults below keep local `./gradlew bootRun` working unchanged.
  datasource:
    url: jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:postgres}
    username: ${PGUSER:vaibhavkohli}
    password: ${PGPASSWORD:}
    driver-class-name: org.postgresql.Driver

# Liquibase
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml

# Railway assigns the listen port via $PORT; defaults to 8080 locally.
server:
  port: ${PORT:8080}

# Comma-separated list. Set APP_CORS_ALLOWED_ORIGINS in production to the deployed URL(s) -
# Spring's CORS filter validates the browser's Origin header against this list even for
# same-origin requests, so it must include wherever the frontend is actually served from.
app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}